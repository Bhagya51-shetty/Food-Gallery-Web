<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h2>Food Gallery</h2>
        <button onclick="logout()">Logout</button>
    </nav>

    <h1 class="title">Dalicious Food Gallery</h1>
    <div class="gallery">

        <div class="card">
            <img src="images/momos.jpg" alt="momos">
            <h3>Momos</h3>
        </div>

        <div class="card">
            <img src="images/burger.jpg" alt="Burger">
            <h3>Burger</h3>
        </div>

        <div class="card">
            <img src="images/pasta.jpg" alt="Pasta">
            <h3>Pasta</h3>
        </div>

        <div class="card">
            <img src="images/cake.jpg" alt="cake">
            <h3>Cake</h3>
        </div>

        <div class="card">
            <img src="images/maggi.jpg" alt="maggi">
            <h3>Maggi</h3>
        </div>

        <div class="card">
            <img src="images/ice-cream.jpg" alt="ice-cream">
            <h3>ice cream</h3>
        </div>

        <div class="card">
            <img src="images/panipuri.jpg" alt="panipuri">
            <h3>Pani puri</h3>
        </div>

    </div>

</body>
</html>
